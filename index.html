<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AC's Portfolio</title>

    <!-- Tailwind CSS -->
    <link href="./main.css" rel="stylesheet">

    <!-- Icons -->
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/3.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-brands/css/uicons-brands.css'>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>   
    <!-- HeaderBar -->
    <header class="headerBar">
        <nav class="hidden lg:flex flex-row gap-5 lg:gap-10 items-center">
            <!-- Home Icon -->
            <a href="/index.html" class="nav">
                Home
            </a>
            
            <!-- Projects Icon -->
            <a href="/projects.html" class="nav">
                Projects
            </a>
        </nav>

        <button id="menu-btn" class="lg:hidden ml-auto">
            <i class="fi fi-rr-menu-burger text-4xl text-gold"></i>
        </button>
    </header>

    <!-- Mobile navigation overlay -->
    <div id="mobile-menu" class="mobile-menu">

        <!-- Sliding menu panel -->
        <nav id="menu-panel" class="menu-panel">              
            <div class="w-[80%] grid auto-rows-auto gap-10">
                    <!-- Column 1 -->
                    <a href="/index.html" class="nav">
                        Home
                    </a>

                    <a href="/projects.html" class="nav">
                        Projects
                    </a>
            </div>

        </nav>
    </div>
    
    
    <main class="pt-30">
        <section id="intro" class="mx-10 md:mx-20 lg:mx-70 top-10 flex flex-row justify-center">

            <div class="flex flex-col">
                <h1 class="text-6xl md:text-8xl font-bold text-gold">
                    Hello
                </h1>

                <p class="text-3xl md:text-4xl flex text-white">
                    I'm Aik Chun
                </p>

                <p class="text-xl md:text-2xl text-white mt-5">
                    A passionate gameplay programmer based in Malaysia who enjoys bringing game ideas to life through code.
                </p>
            </div>
            
        </section>

        <section id="Highlights" class="mt-10 flex justify-center">
        </section>
    </main>

    <!-- Toggle mobile menu -->
    <script>
        const menuBtn = document.getElementById("menu-btn");
        const mobileMenu = document.getElementById("mobile-menu");

        menuBtn.addEventListener("click", () => {
            mobileMenu.classList.toggle("open");
        });

        mobileMenu.addEventListener("click", (e) => {
            if(e.target === mobileMenu){
                mobileMenu.classList.remove("open");
            }
        });
        
    </script>

    <!-- Highlight Current Page -->
    <script>
        const currentPage = window.location.pathname.split("/").pop();

        document.querySelectorAll(".nav").forEach(link => {
            let linkPage = link.getAttribute("href").split("/").pop();

        if(linkPage === currentPage || (currentPage === "" && linkPage === "index.html")){
            link.classList.add("nav-active");
        }
        });
    </script>
    
</body>
</html>
